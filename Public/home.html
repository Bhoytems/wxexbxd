<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Makyton — Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#08070b;
    --surface:#15101d;
    --surface-2:#1c1527;
    --purple-deep:#2c1547;
    --purple:#4a2384;
    --purple-bright:#7c3aed;
    --text:#f4f1f8;
    --text-muted:#948da3;
    --border:#241a32;
    --gold:#e3b341;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
  }
  .app{
    width:100%;
    max-width:430px;
    min-height:100vh;
    position:relative;
    padding-bottom:90px;
  }

  /* Top bar */
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:22px 20px 8px;
  }
  .wordmark{
    font-family:'Sora', sans-serif;
    font-weight:800;
    font-size:20px;
    letter-spacing:0.5px;
  }
  .wordmark span{ color:var(--purple-bright); }
  .avatar{
    width:38px; height:38px;
    border-radius:50%;
    background:linear-gradient(135deg, var(--purple), var(--purple-deep));
    border:1.5px solid var(--border);
  }

  /* Balance hero */
  .balance-card{
    margin:18px 20px 26px;
    border-radius:24px;
    padding:26px 24px;
    background:
      radial-gradient(120% 140% at 100% 0%, rgba(124,58,237,0.35), transparent 60%),
      linear-gradient(160deg, var(--purple-deep), #170c28 70%);
    border:1px solid #2c1c47;
    position:relative;
    overflow:hidden;
  }
  .balance-card::after{
    content:"";
    position:absolute;
    width:180px; height:180px;
    background:radial-gradient(circle, rgba(124,58,237,0.25), transparent 70%);
    top:-60px; right:-60px;
    border-radius:50%;
  }
  .balance-label{
    font-size:13px;
    color:var(--text-muted);
    font-weight:500;
    letter-spacing:0.3px;
  }
  .balance-value{
    font-family:'Sora', sans-serif;
    font-size:42px;
    font-weight:800;
    margin-top:6px;
    display:flex;
    align-items:baseline;
    gap:8px;
  }
  .balance-value span{
    font-size:16px;
    font-weight:600;
    color:var(--purple-bright);
  }
  .balance-sub{
    margin-top:14px;
    font-size:12.5px;
    color:var(--text-muted);
    display:flex;
    align-items:center;
    gap:6px;
  }
  .dot{ width:6px; height:6px; border-radius:50%; background:var(--gold); }

  /* Section headers */
  .section{ padding:0 20px; margin-bottom:10px; }
  .section-title{
    font-family:'Sora', sans-serif;
    font-size:15px;
    font-weight:700;
    margin:22px 0 12px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .section-title .count{
    font-family:'Inter', sans-serif;
    font-size:12px;
    font-weight:500;
    color:var(--text-muted);
    background:var(--surface-2);
    padding:3px 9px;
    border-radius:20px;
  }

  /* Task cards */
  .task-list{ display:flex; flex-direction:column; gap:10px; }

  /* Daily bonus card - distinct gold accent */
  .bonus-card{
    background:linear-gradient(135deg, rgba(227,179,65,0.14), var(--surface));
    border:1px solid #4a3a1a;
    border-radius:16px;
    padding:14px 16px;
    display:flex;
    align-items:center;
    gap:13px;
    margin-bottom:18px;
  }
  .bonus-card .task-icon{ background:rgba(227,179,65,0.18); color:var(--gold); }
  .bonus-card .task-title{ font-size:14px; font-weight:600; }
  .bonus-card .task-reward{ font-size:12px; color:var(--gold); font-weight:600; margin-top:2px; }
  .bonus-btn{
    background:var(--gold);
    color:#241a05;
    border:none;
    border-radius:10px;
    padding:9px 14px;
    font-size:12.5px;
    font-weight:700;
    font-family:'Inter', sans-serif;
    cursor:pointer;
    flex-shrink:0;
    min-width:84px;
    text-align:center;
  }
  .bonus-btn:disabled{
    background:var(--surface-2);
    color:var(--text-muted);
    cursor:default;
    font-weight:600;
    font-variant-numeric:tabular-nums;
  }
  .task-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    padding:14px 16px;
    display:flex;
    align-items:center;
    gap:13px;
    transition:opacity 0.3s ease, transform 0.3s ease;
  }
  .task-icon{
    width:42px; height:42px;
    border-radius:12px;
    background:var(--surface-2);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:19px;
    flex-shrink:0;
  }
  .task-info{ flex:1; min-width:0; }
  .task-title{ font-size:14px; font-weight:600; }
  .task-reward{
    font-size:12px;
    color:var(--gold);
    font-weight:600;
    margin-top:2px;
  }
  .task-btn{
    background:var(--purple-bright);
    color:#fff;
    border:none;
    border-radius:10px;
    padding:9px 14px;
    font-size:12.5px;
    font-weight:600;
    font-family:'Inter', sans-serif;
    cursor:pointer;
    flex-shrink:0;
  }
  .task-btn.secondary{
    background:transparent;
    border:1px solid var(--purple);
    color:var(--text);
  }

  /* Completed tasks - faded */
  .completed .task-card{
    opacity:0.45;
  }
  .completed .task-icon{ background:#171019; }
  .completed .task-btn{
    background:var(--surface-2);
    color:var(--text-muted);
  }
  .check{
    width:20px; height:20px;
    border-radius:50%;
    background:var(--purple-bright);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:11px;
    flex-shrink:0;
  }

  /* Footer nav */
  .footer-nav{
    position:fixed;
    bottom:0; left:50%;
    transform:translateX(-50%);
    width:100%;
    max-width:430px;
    background:rgba(21,16,29,0.92);
    backdrop-filter:blur(14px);
    border-top:1px solid var(--border);
    display:flex;
    justify-content:space-around;
    padding:12px 0 18px;
  }
  .nav-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
    color:var(--text-muted);
    font-size:11px;
    font-weight:500;
  }
  .nav-item.active{ color:var(--purple-bright); }
  a.nav-item{ text-decoration:none; cursor:pointer; }
  .nav-icon{ font-size:19px; }

  .icon{ width:21px; height:21px; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; display:block; }
  .task-icon .icon{ color:var(--text); }
  .check .icon{ width:11px; height:11px; stroke-width:2.8; color:#fff; }
</style>
</head>
<body>
<svg style="display:none">
  <symbol id="icon-home" viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></symbol>
  <symbol id="icon-trophy" viewBox="0 0 24 24"><path d="M6 4h12v3a6 6 0 0 1-12 0V4z"/><path d="M6 5H3a3 3 0 0 0 3 5"/><path d="M18 5h3a3 3 0 0 1-3 5"/><path d="M9 20h6"/><path d="M12 13v4"/></symbol>
  <symbol id="icon-user" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.5-7 8-7s8 3 8 7"/></symbol>
  <symbol id="icon-x" viewBox="0 0 24 24"><path d="M5 5l14 14"/><path d="M19 5L5 19"/></symbol>
  <symbol id="icon-heart" viewBox="0 0 24 24"><path d="M12 20s-7-4.35-9.5-8.5C1 8 2.5 4.5 6 4.5c2 0 3.5 1.2 4 2.5.5-1.3 2-2.5 4-2.5 3.5 0 5 3.5 3.5 7C19 15.65 12 20 12 20z"/></symbol>
  <symbol id="icon-repeat" viewBox="0 0 24 24"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></symbol>
  <symbol id="icon-megaphone" viewBox="0 0 24 24"><path d="M3 10v4a1 1 0 0 0 1 1h2l5 4V5L6 9H4a1 1 0 0 0-1 1z"/><path d="M14 8a4 4 0 0 1 0 8"/><path d="M17 5a8 8 0 0 1 0 14"/></symbol>
  <symbol id="icon-globe" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3a14 14 0 0 1 0 18"/><path d="M12 3a14 14 0 0 0 0 18"/></symbol>
  <symbol id="icon-bot" viewBox="0 0 24 24"><rect x="5" y="8" width="14" height="10" rx="2"/><path d="M12 8V4"/><circle cx="12" cy="3" r="1"/><circle cx="9" cy="13" r="1"/><circle cx="15" cy="13" r="1"/><path d="M9 16h6"/></symbol>
  <symbol id="icon-users" viewBox="0 0 24 24"><circle cx="9" cy="8" r="3"/><path d="M3 20c0-3.3 2.7-5 6-5s6 1.7 6 5"/><circle cx="17" cy="9" r="2.5"/><path d="M15.5 14c2.5 0 4.5 1.6 4.5 4"/></symbol>
  <symbol id="icon-check" viewBox="0 0 24 24"><path d="M5 12l4 4 10-10"/></symbol>
  <symbol id="icon-gift" viewBox="0 0 24 24"><rect x="3" y="9" width="18" height="11" rx="1.5"/><path d="M3 9V6.5A1.5 1.5 0 0 1 4.5 5H19.5A1.5 1.5 0 0 1 21 6.5V9"/><path d="M12 5v15"/><path d="M9 5C7 5 6 3.8 6 2.6 6 1.7 6.7 1 7.6 1 9 1 10.5 2.5 12 5"/><path d="M15 5c2 0 3-1.2 3-2.4C18 1.7 17.3 1 16.4 1 15 1 13.5 2.5 12 5"/></symbol>
</svg>
<div class="app">

  <div class="topbar">
    <div class="wordmark">MAKY<span>TON</span></div>
    <div class="avatar"></div>
  </div>

  <div class="balance-card">
    <div class="balance-label">Your Balance</div>
    <div class="balance-value" id="balanceValue">1,240<span>$MYT</span></div>
    <div class="balance-sub"><span class="dot"></span> Keep completing tasks to climb the leaderboard</div>
  </div>

  <div class="section">
    <div class="bonus-card">
      <div class="task-icon"><svg class="icon"><use href="#icon-gift"></use></svg></div>
      <div class="task-info">
        <div class="task-title">Daily Bonus</div>
        <div class="task-reward" id="bonusReward">+5 $MYT every 24h</div>
      </div>
      <button class="bonus-btn" id="bonusBtn" onclick="claimDailyBonus()">Claim</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Tasks <span class="count" id="activeCount">0 active</span></div>
    <div class="task-list" id="activeTaskList"></div>
  </div>

  <div class="section completed">
    <div class="section-title">Completed <span class="count" id="completedCount">0 done</span></div>
    <div class="task-list" id="completedTaskList"></div>
  </div>

  <div class="footer-nav">
    <a class="nav-item active" href="home.html">
      <div class="nav-icon"><svg class="icon"><use href="#icon-home"></use></svg></div>
      Home
    </a>
    <a class="nav-item" href="leaderboard.html">
      <div class="nav-icon"><svg class="icon"><use href="#icon-trophy"></use></svg></div>
      Leaderboard
    </a>
    <a class="nav-item" href="me.html">
      <div class="nav-icon"><svg class="icon"><use href="#icon-user"></use></svg></div>
      Me
    </a>
  </div>

</div>
<script>
  const balanceValueEl = document.getElementById('balanceValue');
  const bonusBtn = document.getElementById('bonusBtn');
  const bonusReward = document.getElementById('bonusReward');
  let me = null;

  function formatBalance(n){ return n.toLocaleString('en-US'); }
  function renderBalance(n){ balanceValueEl.innerHTML = formatBalance(n) + '<span>$MYT</span>'; }

  async function api(path, options = {}){
    const res = await fetch('/api' + path, {
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      ...options,
    });
    if (res.status === 401){ window.location.href = 'index.html'; throw new Error('not logged in'); }
    return res;
  }

  async function loadMe(){
    const res = await api('/me');
    me = await res.json();
    renderBalance(me.balance);
    updateBonusUI();
  }

  // ---------- Daily Bonus ----------
  function updateBonusUI(){
    const cooldownMs = 24 * 60 * 60 * 1000;
    const last = me.last_daily_bonus_at ? new Date(me.last_daily_bonus_at).getTime() : null;
    const remaining = last ? cooldownMs - (Date.now() - last) : 0;

    if (remaining > 0){
      bonusBtn.disabled = true;
      const h = Math.floor(remaining / 3600000);
      const m = Math.floor((remaining % 3600000) / 60000);
      const s = Math.floor((remaining % 60000) / 1000);
      bonusBtn.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      bonusReward.textContent = 'Come back soon for more';
    } else {
      bonusBtn.disabled = false;
      bonusBtn.textContent = 'Claim';
      bonusReward.textContent = '+5 $MYT every 24h';
    }
  }

  async function claimDailyBonus(){
    try {
      const res = await api('/daily-bonus/claim', { method: 'POST' });
      if (!res.ok) return; // still on cooldown, ignore
      const data = await res.json();
      renderBalance(data.balance);
      me.last_daily_bonus_at = data.lastClaimedAt;
      updateBonusUI();
    } catch {}
  }

  setInterval(() => { if (me) updateBonusUI(); }, 1000);

  // ---------- Tasks ----------
  const ICONS = {
    x_follow: 'icon-x', x_like: 'icon-heart', x_repost: 'icon-repeat',
    join_channel: 'icon-megaphone', start_bot: 'icon-bot',
    visit_website: 'icon-globe', bot_link: 'icon-bot',
  };

  function taskIcon(task){
    return ICONS[task.key] || ICONS[task.type] || 'icon-gift';
  }

  function renderTaskCard(task, isCompleted){
    const icon = taskIcon(task);
    let actions = '';

    if (isCompleted){
      actions = `<div class="check"><svg class="icon"><use href="#icon-check"></use></svg></div>`;
    } else if (task.kind === 'fixed_honor'){
      actions = `<button class="task-btn" onclick="claimFixedTask('${task.key}', '${task.link}')">Start</button>`;
    } else if (task.kind === 'bot_verified'){
      actions = `<button class="task-btn secondary" onclick="window.open('${task.link}', '_blank')">Open</button>`;
    } else if (task.type === 'visit_website'){
      actions = `<button class="task-btn secondary" id="visit-btn-${task.id}" onclick="visitWebsite(${task.id}, '${task.link}')">Visit</button>`;
    } else if (task.type === 'bot_link'){
      actions = `
        <div style="display:flex; flex-direction:column; gap:6px;">
          <button class="task-btn" onclick="window.open('${task.link}', '_blank')">Start Bot</button>
          <button class="task-btn secondary" onclick="claimBotLinkTask(${task.id})">Claim</button>
        </div>`;
    }

    const rewardLabel = isCompleted ? `+${task.reward} $MYT earned` : `+${task.reward} $MYT${task.type === 'visit_website' ? ' · stay 15s' : ''}`;

    return `
      <div class="task-card">
        <div class="task-icon"><svg class="icon"><use href="#${icon}"></use></svg></div>
        <div class="task-info">
          <div class="task-title">${task.title}</div>
          <div class="task-reward">${rewardLabel}</div>
        </div>
        ${actions}
      </div>`;
  }

  async function loadTasks(){
    const res = await api('/tasks');
    const { fixed, dynamic } = await res.json();
    const all = [...fixed, ...dynamic];
    const active = all.filter((t) => !t.done);
    const completed = all.filter((t) => t.done);

    document.getElementById('activeTaskList').innerHTML = active.map((t) => renderTaskCard(t, false)).join('');
    document.getElementById('completedTaskList').innerHTML = completed.map((t) => renderTaskCard(t, true)).join('');
    document.getElementById('activeCount').textContent = `${active.length} active`;
    document.getElementById('completedCount').textContent = `${completed.length} done`;
  }

  async function claimFixedTask(key, link){
    window.open(link, '_blank');
    const res = await api(`/tasks/fixed/${key}/claim`, { method: 'POST' });
    if (res.ok){
      const data = await res.json();
      renderBalance(data.balance);
      loadTasks();
    }
  }

  async function claimBotLinkTask(taskId){
    const res = await api(`/tasks/bot-link/${taskId}/claim`, { method: 'POST' });
    if (res.ok){
      const data = await res.json();
      renderBalance(data.balance);
      loadTasks();
    }
  }

  async function visitWebsite(taskId, link){
    const btn = document.getElementById(`visit-btn-${taskId}`);
    window.open(link, '_blank');
    await api(`/tasks/visit/${taskId}/start`, { method: 'POST' });
    btn.textContent = 'Done';
    btn.setAttribute('onclick', `claimVisitTask(${taskId})`);
  }

  async function claimVisitTask(taskId){
    const res = await api(`/tasks/visit/${taskId}/claim`, { method: 'POST' });
    if (res.ok){
      const data = await res.json();
      renderBalance(data.balance);
      loadTasks();
    } else {
      const err = await res.json();
      if (err.error === 'too_soon'){
        alert("You didn't complete the task");
        const btn = document.getElementById(`visit-btn-${taskId}`);
        if (btn){
          btn.textContent = 'Visit';
          btn.setAttribute('onclick', `visitWebsite(${taskId}, '')`);
        }
        loadTasks(); // re-render with the original Visit link wired up correctly
      }
    }
  }

  // Periodically refresh so bot-verified tasks (join channel / start bot) flip to
  // "completed" automatically once the companion bot detects them — no manual refresh needed.
  async function init(){
    await loadMe();
    await loadTasks();
    setInterval(loadTasks, 15000);
    setInterval(loadMe, 15000);
  }
  init();
</script>
</body>
</html>
