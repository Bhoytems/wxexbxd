<title>Makyton — Loading</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --text:#f4f1f8;
    --text-muted:#c9bfe0;
    --purple-bright:#a855f7;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{ height:100%; }
  body{
    background:#08040d;
    color:var(--text);
    font-family:'Inter', sans-serif;
    display:flex;
    justify-content:center;
    overflow:hidden;
  }
  .stage{
    width:100%;
    max-width:430px;
    height:100vh;
    position:relative;
    overflow:hidden;
  }
  .poster{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center top;
  }
  .scrim{
    position:absolute;
    left:0; right:0; bottom:0;
    height:34%;
    background:linear-gradient(0deg, rgba(5,2,9,0.95) 0%, rgba(5,2,9,0.55) 55%, transparent 100%);
  }

  .loading-wrap{
    position:absolute;
    bottom:46px; left:0; right:0;
    text-align:center;
    z-index:20;
    padding:0 46px;
  }
  .loading-label{
    font-size:12.5px;
    color:var(--text-muted);
    margin-bottom:10px;
    letter-spacing:0.4px;
  }
  .loading-label b{ color:var(--text); font-weight:600; }
  .loading-track{
    width:100%;
    height:6px;
    border-radius:10px;
    background:rgba(255,255,255,0.12);
    overflow:hidden;
  }
  .loading-fill{
    height:100%;
    width:0%;
    border-radius:10px;
    background:linear-gradient(90deg, #6d28d9, var(--purple-bright));
    transition:width 0.1s linear;
  }

  .login-wrap{
    position:absolute;
    bottom:60px; left:0; right:0;
    text-align:center;
    z-index:20;
    padding:0 30px;
  }
  .login-label{
    font-size:13px;
    color:var(--text-muted);
    margin-bottom:16px;
  }
  #telegramLoginContainer{ display:flex; justify-content:center; }
</style>
</head>

  <div class="scrim"></div>

  <div class="login-wrap" id="loginWrap">
    <div class="login-label">Log in with Telegram to enter Makyton</div>
    <div id="telegramLoginContainer"></div>
  </div>

  <div class="loading-wrap" id="loadingWrap" style="display:none;">
    <div class="loading-label">Entering Makyton… <b id="pct">0%</b></div>
    <div class="loading-track"><div class="loading-fill" id="fill"></div></div>
  </div>
</div>

<script>
  const DURATION_MS = 10000;
  const REDIRECT_TO = 'home.html';

  const loginWrap = document.getElementById('loginWrap');
  const loadingWrap = document.getElementById('loadingWrap');
  const fill = document.getElementById('fill');
  const pct = document.getElementById('pct');

  function startLoader(){
    loginWrap.style.display = 'none';
    loadingWrap.style.display = 'block';
    const start = performance.now();
    function tick(now){
      const elapsed = now - start;
      const progress = Math.min(elapsed / DURATION_MS, 1);
      fill.style.width = (progress * 100).toFixed(0) + '%';
      pct.textContent = Math.round(progress * 100) + '%';
      if (progress < 1) {
        requestAnimationFrame(tick);
      } else {
        window.location.href = REDIRECT_TO;
      }
    }
    requestAnimationFrame(tick);
  }

  // Called by the Telegram Login Widget once the user authorizes
  window.onTelegramAuth = async function(user){
    const ref = new URLSearchParams(window.location.search).get('ref');
    try {
      const res = await fetch('/api/auth/telegram', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ ...user, ref }),
      });
      if (!res.ok) throw new Error('login failed');
      startLoader();
    } catch (err) {
      alert('Login failed — please try again.');
    }
  };

  async function init(){
    // Already have a valid session? Skip straight to the loader.
    try {
      const meRes = await fetch('/api/me', { credentials: 'include' });
      if (meRes.ok) {
        startLoader();
        return;
      }
    } catch {}

    // Not logged in — render the Telegram Login Widget
    const configRes = await fetch('/api/auth/config');
    const { botUsername } = await configRes.json();

    const script = document.createElement('script');
    script.src = 'https://telegram.org/js/telegram-widget.js?22';
    script.async = true;
    script.setAttribute('data-telegram-login', botUsername);
    script.setAttribute('data-size', 'large');
    script.setAttribute('data-radius', '12');
    script.setAttribute('data-onauth', 'onTelegramAuth(user)');
    script.setAttribute('data-request-access', 'write');
    document.getElementById('telegramLoginContainer').appendChild(script);
  }

  init();
</script>
